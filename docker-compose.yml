version: '3.8'

services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dadi_next_site
    restart: always
    expose:
      - "3000"
    # volumes:
    #   - .:/app
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://diwaj-co.ir/
      - NEXTAUTH_URL=https://diwaj-co.ir/
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: dadi_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/certs:ro    
    depends_on:
      - nextjs-app
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

