user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    upstream nextjs_backend {
        server nextjs-app:3000;
    }

    # ۱. انتقال تمام درخواست‌های HTTP معمولی به HTTPS
    server {
        listen 80;
        server_name diwaj-co.ir www.diwaj-co.ir;
        return 301 https://$host$request_uri;
    }

    # ۲. سرور اصلی HTTPS با گواهی کلودفلر
    server {
        listen 443 ssl;
        server_name diwaj-co.ir www.diwaj-co.ir;

        # آدرس فایل‌ها داخل کانتینر (باید با حجم‌های داکر کامپوز یکی باشه)
        ssl_certificate /etc/ssl/certs/diwaj.pem;
        ssl_certificate_key /etc/ssl/certs/diwaj.key;

        # تنظیمات امنیتی استاندارد SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        real_ip_header CF-Connecting-IP;

        location / {
            proxy_pass http://nextjs_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_cache_bypass $http_upgrade;
        }
    }
}
